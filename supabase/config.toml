# Supabase Configuration for stuffnthings LMS

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
max_connections = 60

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://stuffnthings.io", "https://www.stuffnthings.io"]
jwt_expiry = 3600
enable_signup = true
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Third-party auth providers
[auth.external.github]
enabled = false

[auth.external.google]
enabled = false

[functions]
verify_jwt = true

[edge_functions]
# Edge functions configuration